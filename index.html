<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>shahab-Shop</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #111;
  color: white;
}

header {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, #000, #333);
}

header h1 {
  font-size: 48px;
  margin: 0;
  letter-spacing: 4px;
}

header p {
  color: #aaa;
}

.products {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding: 20px;
}

.product {
  background: #1c1c1c;
  border-radius: 12px;
  padding: 20px;
  margin: 15px;
  width: 250px;
  text-align: center;
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.05);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  background: #ddd;
}

.cart {
  background: #000;
  padding: 20px;
  margin-top: 20px;
}

.cart h2 {
  text-align: center;
}

#cart-items {
  list-style: none;
  padding: 0;
  text-align: center;
}
</style>

</head>
<body>

<header>
  <h1>shahab </h1>
  <p>Minimal. Modern. Yours.</p>
</header>

<section class="products">

  <div class="product">
    <img src="https://via.placeholder.com/250">
    <h2>Classic Hoodie</h2>
    <p>€39.99</p>
    <button onclick="addToCart('Classic Hoodie')">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250">
    <h2>Street T-Shirt</h2>
    <p>€24.99</p>
    <button onclick="addToCart('Street T-Shirt')">Add to Cart</button>
  </div>




</section>

<section class="cart">
  <h2>🛒 Cart</h2>
  <ul id="cart-items"></ul>
</section>

<script>
let cart = [];

function addToCart(product) {
  cart.push(product);
  displayCart();
}

function displayCart() {
  const list = document.getElementById("cart-items");
  list.innerHTML = "";

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
